<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(
        135deg,
        #fff5f7,
        #f8f4ff
    );
}

.container{
    text-align:center;
}

h1{
    margin-bottom:15px;
    font-size:36px;
    color:#2d2d2d;
}

.subtitle{
    color:#666;
    margin-bottom:50px;
}

.profiles{
    display:flex;
    gap:30px;
    justify-content:center;
}

.profile{
    width:180px;
    height:220px;
    background: rgba(255,255,255,0.8);
    backdrop-filter: blur(10px);
    border:1px solid rgba(255,255,255,0.5);
    border-radius:16px;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.2s;
    box-shadow:
        0 8px 24px rgba(0,0,0,.08);
}

.profile:hover{
    transform:translateY(-8px);
    box-shadow:
        0 15px 35px rgba(0,0,0,.12);
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    margin-bottom:20px;
}

.nhu{
    background:
    linear-gradient(
        135deg,
        #c084fc,
        #9333ea
    );
}

.nam{
    background:
    linear-gradient(
        135deg,
        #2dd4bf,
        #0d9488
    );
}

.name{
    font-size:22px;
    color:#333;
}
</style>
</head>

<body>

<div class="container">

    <h1>Chọn người dùng</h1>

    <p class="subtitle">
        Viết/ Đọc với tư cách:
    </p>

    <div class="profiles">

        <div class="profile" onclick="selectProfile('Như')">
            <div class="avatar nhu">N</div>
            <div class="name">Như</div>
        </div>

        <div class="profile" onclick="selectProfile('Nam')">
            <div class="avatar nam">N</div>
            <div class="name">Nam</div>
        </div>

    </div>

</div>

<script>
function selectProfile(name){
    localStorage.setItem("writer", name);
    window.location.href = "main.html";
}
</script>

</body>
</html>
