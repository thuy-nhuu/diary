<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>Nhật ký</title>

    <style>
      body {
        max-width: 800px;
        margin: auto;
        padding: 30px;
        background: linear-gradient(135deg, #fff7fb, #f5f3ff);

        font-family: "Quicksand", sans-serif;
      }

      h1 {
        text-align: center;
        font-size: 48px;
        margin-bottom: 10px;
        color: #4c1d95;
      }

      #writer {
        text-align: center;
        color: #666;
      }

      #writeBtn {
        display: block;
        margin: 25px auto;
        padding: 14px 28px;
        border: none;
        border-radius: 999px;
        background: linear-gradient(135deg, #c084fc, #8b5cf6);

        color: white;
        font-weight: 700;
        cursor: pointer;
        transition: 0.2s;
      }

      #writeBtn:hover {
        transform: translateY(-2px);
      }

      #editor {
        display: none;
        margin-bottom: 20px;
      }

      textarea {
        width: 100%;
        height: 220px;
        padding: 18px;
        border: none;
        border-radius: 18px;
        background: white;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);

        font-size: 16px;
      }

      #saveBtn {
        margin-top: 10px;
        padding: 10px 20px;
      }

      .card {
        background: white;
        border-radius: 20px;
        padding: 20px;
        margin-top: 18px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      }
      .author {
        font-size: 22px;
        font-weight: 700;
        color: black;
      }

      .time {
        color: gray;
        font-size: 14px;
        margin-top: 5px;
      }

      .readBtn {
        margin-top: 10px;
      }

      .popup {
        position: fixed;
        inset: 0;

        background: rgba(0, 0, 0, 0.4);

        display: none;

        justify-content: center;
        align-items: center;

        z-index: 1000;
      }

      .popup-content {
        width: min(700px, 90%);
        max-height: 80vh;

        overflow: auto;

        background: white;

        border-radius: 20px;

        padding: 25px;

        position: relative;
      }

      #closePopup {
        position: absolute;
        right: 15px;
        top: 15px;

        border: none;
        background: none;

        cursor: pointer;

        font-size: 20px;
      }

      #popupContent {
        white-space: pre-wrap;
        line-height: 1.8;
        margin-top: 20px;
      }

      #deleteBtn {
        margin-top: 25px;
      }
    </style>
  </head>

  <body>
    <div id="popup" class="popup">
      <div class="popup-content">
        <button id="closePopup">✕</button>

        <h2 id="popupAuthor"></h2>

        <p id="popupTime"></p>

        <div id="popupContent"></div>

        <button id="deleteBtn">🗑️ Xóa</button>
        <button id="editBtn">✏️ Sửa</button>
      </div>
    </div>

    <h1>Our Diary 💌</h1>

    <p id="writer"></p>

    <button id="writeBtn">+ Viết nhật ký</button>

    <div id="editor">
      <textarea id="content" placeholder="Hôm nay có gì muốn kể..."></textarea>

      <button id="saveBtn">Lưu</button>
    </div>

    <div id="list"></div>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

      const supabaseUrl = "https://kxhzsfclgrgfratvoffm.supabase.co";

      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4aHpzZmNsZ3JnZnJhdHZvZmZtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE5ODgxODQsImV4cCI6MjA5NzU2NDE4NH0.NWYnVXvXw_Gja9jIlTZuVOTxPDA3s_7gwK-EWe0iZfE";

      const supabase = createClient(supabaseUrl, supabaseKey);

      const writer = localStorage.getItem("writer");

      // ===== ELEMENTS =====

      const writerText = document.getElementById("writer");

      const writeBtn = document.getElementById("writeBtn");

      const saveBtn = document.getElementById("saveBtn");

      const editor = document.getElementById("editor");

      const contentInput = document.getElementById("content");

      const list = document.getElementById("list");

      const popup = document.getElementById("popup");

      const popupAuthor = document.getElementById("popupAuthor");

      const popupTime = document.getElementById("popupTime");

      const popupContent = document.getElementById("popupContent");

      const deleteBtn = document.getElementById("deleteBtn");

      const editBtn = document.getElementById("editBtn");

      const closePopup = document.getElementById("closePopup");

      // ===== BIẾN =====

      let currentDiaryId = null;

      // ===== HIỂN THỊ NGƯỜI VIẾT =====

      writerText.innerText = "Đang viết với tư cách: " + writer;

      // ===== MỞ / ĐÓNG KHUNG VIẾT =====

      writeBtn.onclick = () => {
        editor.style.display =
          editor.style.display === "block" ? "none" : "block";
      };

      // ===== LƯU NHẬT KÝ =====

      saveBtn.onclick = saveDiary;

      async function saveDiary() {
        const content = contentInput.value.trim();

        if (!content) return;

        const { error } = await supabase.from("diaries").insert([
          {
            author: writer,
            content: content,
          },
        ]);

        console.log("INSERT ERROR:", error);

        if (error) {
          alert(JSON.stringify(error));
          return;
        }

        contentInput.value = "";

        editor.style.display = "none";

        loadDiaries();
      }

      // ===== TẢI DANH SÁCH =====

      async function loadDiaries() {
        const { data, error } = await supabase
          .from("diaries")
          .select("*")
          .order("created_at", { ascending: false });

        if (error) {
          console.log(error);
          return;
        }

        list.innerHTML = "";

        data.forEach((diary) => {
          const color = diary.author === "Như" ? "#c084fc" : "#14b8a6";
          const card = document.createElement("div");

          card.className = "card";

          card.style.borderLeft = `6px solid ${color}`;

          card.innerHTML = `
            <div class="author">
                ${diary.author}
            </div>

            <div class="time">
                ${new Date(diary.created_at).toLocaleString()}
            </div>

            <button class="readBtn">
                💌 Đọc
            </button>
        `;

          card.querySelector(".readBtn").onclick = () => openDiary(diary);

          list.appendChild(card);
        });
      }

      // ===== POPUP =====

      function openDiary(diary) {
        console.log("writer =", writer);
        console.log("author =", diary.author);
        currentDiaryId = diary.id;

        popupAuthor.textContent = diary.author;

        popupTime.textContent = new Date(diary.created_at).toLocaleString();

        popupContent.textContent = diary.content;

        if (writer === diary.author) {
          deleteBtn.style.display = "inline-block";

          editBtn.style.display = "inline-block";
        } else {
          deleteBtn.style.display = "none";

          editBtn.style.display = "none";
        }

        popup.style.display = "flex";
      }

      closePopup.onclick = () => {
        popup.style.display = "none";
      };

      // ===== XOÁ =====

      deleteBtn.onclick = async () => {
        console.log("currentDiaryId =", currentDiaryId);

        if (!confirm("Xóa nhật ký này?")) {
          return;
        }

        const { data, error } = await supabase
          .from("diaries")
          .delete()
          .eq("id", currentDiaryId)
          .select();

        console.log("deleted data =", data);
        console.log("delete error =", error);

        if (error) {
          alert(error.message);
          return;
        }

        popup.style.display = "none";

        await loadDiaries();
      };

      // ===== SỬA =====

      editBtn.onclick = async () => {
        const oldText = popupContent.textContent;

        const newText = prompt("Sửa nội dung:", oldText);

        if (!newText || newText === oldText) {
          return;
        }

        const { error } = await supabase
          .from("diaries")
          .update({
            content: newText,
          })
          .eq("id", currentDiaryId);

        if (error) {
          alert(error.message);
          return;
        }

        popupContent.textContent = newText;

        loadDiaries();
      };
      // ===== KHỞI ĐỘNG =====

      loadDiaries();
    </script>
  </body>
</html>
